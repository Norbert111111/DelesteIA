<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Smart Grid - Thème Clair</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== PALETTE CLAIRE PROFESSIONNELLE ===== */
:root {
    --green: #3d9605;
    --red: #dc2626;
    --orange: #d97706;
    --blue: #2563eb;
    --bg: #d9e0e8;
    --card: #f4ecec;
    --text: #1e293b;
}

/* ===== BASE ===== */
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
}

.wrap {
    padding: 15px;
}

/* ===== TITRE ===== */
h1 {
    text-align: center;
    color: var(--blue);
}

/* ===== CARD ===== */
.card {
    background: var(--card);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    border-left: 5px solid var(--blue);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-2px);
}

/* ETATS */
.normalCard { border-left: 5px solid var(--green); }
.warningCard { border-left: 5px solid var(--orange); }
.dangerCard { border-left: 5px solid var(--red); }

/* ANIMATION DANGER */
.dangerCard {
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 rgba(220,38,38,0.2); }
    50% { box-shadow: 0 0 15px rgba(220,38,38,0.4); }
    100% { box-shadow: 0 0 0 rgba(220,38,38,0.2); }
}

/* KPI */
.kpi-row {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
}

/* VALEURS */
.value {
    font-weight: bold;
    transition: 0.3s;
}

.normal { color: var(--green); }
.medium { color: var(--orange); }
.high { color: var(--red); }

/* ===== BOUTONS ===== */
.kpi-button {
    padding: 8px 18px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

/* ON */
.on {
    background: var(--green);
    color: white;
}

/* OFF */
.off {
    background: var(--red);
    color: white;
}

.kpi-button:active {
    transform: scale(0.9);
}

/* GRAPH */
canvas {
    max-height: 250px;
}

</style>
</head>

<body>

<div class="wrap">

<h1>SMART CABINE ET DELESTAGE SMART</h1>

<div class="card normalCard" id="mainCard">
    <div class="kpi-row"><span>Tension :</span><span id="voltVal" class="value normal">-- V</span></div>
    <div class="kpi-row"><span>Courant :</span><span id="curVal" class="value normal">-- A</span></div>
    <div class="kpi-row"><span>Puissance :</span><span id="powerVal" class="value normal">-- W</span></div>
</div>

<div class="card">
    <h3 style="color: var(--blue)">Commandes Départs</h3>
    <div class="kpi-row">Départ 1 <button id="btn1" class="kpi-button off">OFF</button></div>
    <div class="kpi-row">Départ 2 <button id="btn2" class="kpi-button off">OFF</button></div>
    <div class="kpi-row">Départ 3 <button id="btn3" class="kpi-button off">OFF</button></div>
    <div class="kpi-row">Départ 4 <button id="btn4" class="kpi-button off">OFF</button></div>
</div>

<div class="card">
    <canvas id="chart"></canvas>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "maison-iot-b0dd6.firebaseapp.com",
    databaseURL: "https://maison-iot-b0dd6-default-rtdb.firebaseio.com",
    projectId: "maison-iot-b0dd6",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// DOM
const voltVal = document.getElementById("voltVal");
const curVal = document.getElementById("curVal");
const powerVal = document.getElementById("powerVal");
const mainCard = document.getElementById("mainCard");

const btn1 = document.getElementById("btn1");
const btn2 = document.getElementById("btn2");
const btn3 = document.getElementById("btn3");
const btn4 = document.getElementById("btn4");

// GRAPH
const chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Puissance",
            data: [],
            borderColor: "#2563eb",
            backgroundColor: "rgba(37,99,235,0.1)",
            fill: true,
            tension: 0.4
        }]
    }
});

// VARIABLES
let currentCommandes = {};
let lastDelestageTime = 0;

const SEUIL = 1000;
const DELAY = 5000;

// ANIMATION
function animate(el, val) {
    el.style.opacity = 0;
    setTimeout(() => {
        el.innerText = val;
        el.style.opacity = 1;
    }, 150);
}

// DELESTAGE (inchangé)
function delestageAuto(power) {
    const now = Date.now();
    if (power <= SEUIL) return;
    if (now - lastDelestageTime < DELAY) return;

    const ordre = ["Comm4","Comm3","Comm2","Comm1"];

    for (let key of ordre) {
        if (currentCommandes[key] == 1) {
            set(ref(db, "commande/" + key), 0);
            lastDelestageTime = now;
            break;
        }
    }
}

// REALTIME
onValue(ref(db, "compteur/realtime"), snap => {
    const d = snap.val();
    if (!d) return;

    let cur = d.courant || 0;
    let volt = d.tension || 0;
    let power = cur * volt;

    animate(voltVal, volt.toFixed(2) + " V");
    animate(curVal, cur.toFixed(2) + " A");
    animate(powerVal, power.toFixed(2) + " W");

    // COULEURS INTELLIGENTES
    if (power > SEUIL) {
        mainCard.className = "card dangerCard";
        powerVal.className = "value high";
    }
    else if (power > SEUIL * 0.7) {
        mainCard.className = "card warningCard";
        powerVal.className = "value medium";
    }
    else {
        mainCard.className = "card normalCard";
        powerVal.className = "value normal";
    }

    chart.data.labels.push(new Date().toLocaleTimeString());
    chart.data.datasets[0].data.push(power);

    if (chart.data.labels.length > 15) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    chart.update();

    set(ref(db, "deleste"), {
        courant: cur,
        tension: volt,
        puissance: power,
        consommation: power / 1000
    });

    delestageAuto(power);
});

// COMMANDES (inchangé)
function toggle(btn, path) {
    const isOn = btn.classList.contains("on");
    set(ref(db, path), isOn ? 0 : 1);
}

btn1.onclick = () => toggle(btn1, "commande/Comm1");
btn2.onclick = () => toggle(btn2, "commande/Comm2");
btn3.onclick = () => toggle(btn3, "commande/Comm3");
btn4.onclick = () => toggle(btn4, "commande/Comm4");

// SYNC
onValue(ref(db, "commande"), snap => {
    const c = snap.val();
    if (!c) return;

    currentCommandes = c;

    update(btn1, c.Comm1);
    update(btn2, c.Comm2);
    update(btn3, c.Comm3);
    update(btn4, c.Comm4);
});

function update(btn, val) {
    if (val == 1) {
        btn.classList.add("on");
        btn.classList.remove("off");
        btn.innerText = "ON";
    } else {
        btn.classList.add("off");
        btn.classList.remove("on");
        btn.innerText = "OFF";
    }
}
</script>

</body>
</html>
