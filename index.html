<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dashboard IoT - 4 Départs</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}
.wrap { padding: 10px; }
.card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}
.kpi-row {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
}
.kpi-button {
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}
.on { background: #00c2a8; }
.off { background: #ff4d4d; }

h1 {
    text-align: center;
    color: #00c2a8;
}
</style>
</head>

<body>

<div class="wrap">

<h1>SMART GRID - 4 DÉPARTS</h1>

<div class="card">
    <div class="kpi-row"><span>Tension :</span><span id="voltVal">-- V</span></div>
    <div class="kpi-row"><span>Courant :</span><span id="curVal">-- A</span></div>
    <div class="kpi-row"><span>Puissance :</span><span id="powerVal">-- W</span></div>
</div>

<div class="card">
    <h3>Commandes Départs</h3>
    <div class="kpi-row">Départ 1 <button id="btn1" class="kpi-button off">OFF</button></div>
    <div class="kpi-row">Départ 2 <button id="btn2" class="kpi-button off">OFF</button></div>
    <div class="kpi-row">Départ 3 <button id="btn3" class="kpi-button off">OFF</button></div>
    <div class="kpi-row">Départ 4 <button id="btn4" class="kpi-button off">OFF</button></div>
</div>

<div class="card">
    <canvas id="chart"></canvas>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "maison-iot-b0dd6.firebaseapp.com",
    databaseURL: "https://maison-iot-b0dd6-default-rtdb.firebaseio.com",
    projectId: "maison-iot-b0dd6",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// DOM
const voltVal = document.getElementById("voltVal");
const curVal = document.getElementById("curVal");
const powerVal = document.getElementById("powerVal");

const btn1 = document.getElementById("btn1");
const btn2 = document.getElementById("btn2");
const btn3 = document.getElementById("btn3");
const btn4 = document.getElementById("btn4");

// GRAPH
const ctx = document.getElementById("chart").getContext("2d");
const chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Puissance",
            data: [],
            borderColor: "#00c2a8"
        }]
    }
});

// ---------------- VARIABLES GLOBALES ----------------
let currentCommandes = {};
let lastDelestageTime = 0;

const SEUIL = 1000; // ⚡ seuil de puissance (W)
const DELAY = 5000; // ⏱️ délai entre délestages (ms)

// ---------------- DELESTAGE INTELLIGENT ----------------
function delestageAuto(power) {

    const now = Date.now();

    if (power <= SEUIL) return;

    // éviter coupures trop rapides
    if (now - lastDelestageTime < DELAY) return;

    const ordre = [
        { key: "Comm4", btn: btn4 },
        { key: "Comm3", btn: btn3 },
        { key: "Comm2", btn: btn2 },
        { key: "Comm1", btn: btn1 }
    ];

    console.log("⚠️ Surcharge détectée :", power);

    for (let dep of ordre) {
        if (currentCommandes[dep.key] == 1) {
            console.log("❌ Coupure :", dep.key);
            set(ref(db, "commande/" + dep.key), 0);
            lastDelestageTime = now;
            break;
        }
    }
}

// ---------------- REALTIME DATA ----------------
onValue(ref(db, "compteur/realtime"), snap => {
    const d = snap.val();
    if (!d) return;

    let cur = d.courant || 0;
    let volt = d.tension || 0;
    let power = cur * volt;

    voltVal.innerText = volt.toFixed(2) + " V";
    curVal.innerText = cur.toFixed(2) + " A";
    powerVal.innerText = power.toFixed(2) + " W";

    // GRAPH
    chart.data.labels.push(new Date().toLocaleTimeString());
    chart.data.datasets[0].data.push(power);

    if (chart.data.labels.length > 15) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    chart.update();

    // 🔥 ENVOI données
    set(ref(db, "deleste"), {
        courant: cur,
        tension: volt,
        puissance: power,
        consommation: (power / 1000)
    });

    // 🔥 DELESTAGE
    delestageAuto(power);
});

// ---------------- COMMANDES ----------------
function toggle(btn, path) {
    const isOn = btn.classList.contains("on");
    set(ref(db, path), isOn ? 0 : 1);
}

btn1.onclick = () => toggle(btn1, "commande/Comm1");
btn2.onclick = () => toggle(btn2, "commande/Comm2");
btn3.onclick = () => toggle(btn3, "commande/Comm3");
btn4.onclick = () => toggle(btn4, "commande/Comm4");

// ---------------- SYNC COMMANDES ----------------
onValue(ref(db, "commande"), snap => {
    const c = snap.val();
    if (!c) return;

    currentCommandes = c;

    update(btn1, c.Comm1);
    update(btn2, c.Comm2);
    update(btn3, c.Comm3);
    update(btn4, c.Comm4);
});

function update(btn, val) {
    if (val == 1) {
        btn.classList.add("on");
        btn.classList.remove("off");
        btn.innerText = "ON";
    } else {
        btn.classList.add("off");
        btn.classList.remove("on");
        btn.innerText = "OFF";
    }
}
</script>

</body>
</html>
